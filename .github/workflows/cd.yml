name: CD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  distribute:
    name: Build & Distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore

      - name: Verify keystore exists
        run: ls -la $GITHUB_WORKSPACE/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          BUILD_VERSION: ${{ github.ref_name }}
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: default-testers
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: "Release ${{ github.ref_name }} — build ${{ github.run_number }}"